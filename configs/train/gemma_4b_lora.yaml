model:
  name_or_path: "E:/LLM/gemma/gemma-4-E4B-it"

data:
  train_file: "data/training_data2.train.jsonl"
  eval_file: "data/training_data2.val.jsonl"
  system_key: "messages"

output:
  dir: "outputs/gemma_4b_lora"

train:
  max_length: 900
  learning_rate: 1.0e-4
  num_train_epochs: 50
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 16
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  warmup_ratio: 0.03
  weight_decay: 0.0
  bf16: true
  fp16: false
  gradient_checkpointing: true
  seed: 42

peft:
  finetune_type: "lora"
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  use_dora: false
  use_4bit: false

